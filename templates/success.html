<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .success-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .success-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 0.6s ease;
        }
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .success-container h1 {
            color: #28a745;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .success-container p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .details-box {
            background: #f5f7ff;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            padding: 25px;
            margin: 30px 0;
            text-align: left;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            color: #667eea;
            font-weight: 600;
        }
        .detail-value {
            color: #333;
            font-weight: 500;
        }
        .confirmation-message {
            color: #28a745;
            font-size: 1rem;
            margin-top: 20px;
            font-weight: 500;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }
        .btn-home {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
            color: white;
        }
        .btn-print {
            background: #e9ecef;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-print:hover {
            background: #667eea;
            color: white;
        }
        .reference-number {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
        }
        @media print {
            body {
                background: white;
            }
            .success-container {
                box-shadow: none;
            }
            .button-group {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✅</div>
        <h1>Registration Successful!</h1>
        <p>Your hostel room has been successfully allocated.</p>

        <div class="details-box">
            <div class="detail-row">
                <span class="detail-label">Student Name:</span>
                <span class="detail-value">{{ name }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Student ID:</span>
                <span class="detail-value">{{ student_id }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Assigned Room:</span>
                <span class="detail-value" style="color: #667eea; font-weight: 700;">{{ room }}</span>
            </div>
        </div>

        <div class="confirmation-message">
            ✓ Please check your email for further instructions
        </div>

        <div class="reference-number">
            📌 Reference ID: {{ student_id }}-{{ room }}
        </div>

        <div class="button-group">
            <a href="/" class="btn-home">← Back to Home</a>
            <button class="btn-print" onclick="window.print()">🖨️ Print Confirmation</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
