<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Room Allocation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url('https://img.freepik.com/premium-photo/hotel-room-with-view-city-room-is-dark-empty-with-bed-unmade-curtains-drawn_14117-368742.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container-custom {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 50px;
            max-width: 600px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        .header p {
            color: #666;
            font-size: 1.1rem;
        }
        .form-section {
            margin-bottom: 30px;
        }
        .form-section h5 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
        .form-control {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
            color: white;
        }
        .btn-submit:active {
            transform: translateY(0);
        }
        .rooms-table-section h5 {
            color: #333;
            margin-top: 30px;
            margin-bottom: 20px;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .table {
            margin-top: 15px;
        }
        .table thead th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
        }
        .table tbody td {
            border-color: #eee;
            color: #333;
            padding: 12px;
        }
        .table tbody tr:hover {
            background-color: #f5f7ff;
        }
    </style>
</head>
<body>
    <div class="container-custom">
        <div class="header">
            <h1>🏢 Hostel Management</h1>
            <p>Room Allocation System</p>
        </div>

        <div class="form-section">
            <h5>📝 Student Registration</h5>
            <form action="/submit" method="POST" id="registrationForm">
                <div class="form-group">
                    <label for="name">Student Name *</label>
                    <input type="text" class="form-control" id="name" name="name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="student_id">Student ID *</label>
                    <input type="text" class="form-control" id="student_id" name="student_id" required placeholder="Enter your student ID">
                </div>

                <div class="form-group">
                    <label for="room">Select Room *</label>
                    <select class="form-control" id="room" name="room" required>
                        <option value="" selected disabled>-- Choose a room --</option>
                        {% for room in rooms %}
                        <option value="{{ room }}">{{ room }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="btn-submit">✓ Register</button>
            </form>
        </div>

        <div class="rooms-table-section">
            <h5>🚪 Available Rooms</h5>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Room Number</th>
                    </tr>
                </thead>
                <tbody>
                    {% for room in rooms %}
                    <tr>
                        <td>{{ room }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
